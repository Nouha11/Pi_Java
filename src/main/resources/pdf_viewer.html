<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>PDF Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #525659; font-family: sans-serif; }
#toolbar { display: flex; align-items: center; gap: 10px; background: #323639; padding: 8px 16px; color: white; font-size: 13px; position: sticky; top: 0; z-index: 100; }
#toolbar button { background: #0d6efd; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 13px; }
#toolbar button:disabled { background: #555; cursor: not-allowed; }
#page-info { min-width: 90px; text-align: center; }
#zoom-info { color: #aaa; font-size: 12px; }
#pages { display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 12px; }
.page-wrapper { position: relative; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
.page-wrapper canvas { display: block; }
/* PDF.js text layer  sits on top of canvas, makes text selectable */
.textLayer {
  position: absolute;
  top: 0; left: 0;
  overflow: hidden;
  opacity: 0.2;
  line-height: 1;
  pointer-events: auto;
}
.textLayer span {
  color: transparent;
  position: absolute;
  white-space: pre;
  cursor: text;
  transform-origin: 0% 0%;
}
.textLayer ::selection { background: rgba(0, 100, 255, 0.3); }
#loading { color: #ccc; text-align: center; padding: 60px; font-size: 16px; }
</style>
</head>
<body>
<div id="toolbar">
  <button id="btn-prev" onclick="changePage(-1)" disabled>&#8592; Prev</button>
  <span id="page-info">Page - of -</span>
  <button id="btn-next" onclick="changePage(1)" disabled>Next &#8594;</button>
  <span style="flex:1"></span>
  <span id="zoom-info">100%</span>
  <button onclick="changeZoom(-0.2)">&#8722;</button>
  <button onclick="changeZoom(0.2)">&#43;</button>
</div>
<div id="loading">Loading PDF...</div>
<div id="pages"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

var pdfDoc = null;
var currentPage = 1;
var scale = 1.4;
var rendering = false;

function loadPdf(url) {
  pdfjsLib.getDocument(url).promise.then(function(pdf) {
    pdfDoc = pdf;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('btn-prev').disabled = true;
    document.getElementById('btn-next').disabled = pdf.numPages <= 1;
    renderPage(1);
  }).catch(function(err) {
    document.getElementById('loading').textContent = 'Error loading PDF: ' + err.message;
  });
}

function renderPage(num) {
  if (rendering) return;
  rendering = true;
  currentPage = num;

  pdfDoc.getPage(num).then(function(page) {
    var viewport = page.getViewport({ scale: scale });

    // Create wrapper
    var wrapper = document.createElement('div');
    wrapper.className = 'page-wrapper';
    wrapper.style.width = viewport.width + 'px';
    wrapper.style.height = viewport.height + 'px';

    // Canvas layer
    var canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    wrapper.appendChild(canvas);

    // Text layer div (for selection)
    var textLayerDiv = document.createElement('div');
    textLayerDiv.className = 'textLayer';
    textLayerDiv.style.width = viewport.width + 'px';
    textLayerDiv.style.height = viewport.height + 'px';
    wrapper.appendChild(textLayerDiv);

    var container = document.getElementById('pages');
    container.innerHTML = '';
    container.appendChild(wrapper);

    // Render canvas
    page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise.then(function() {
      // Render text layer on top
      return page.getTextContent();
    }).then(function(textContent) {
      pdfjsLib.renderTextLayer({
        textContentSource: textContent,
        container: textLayerDiv,
        viewport: viewport,
        textDivs: []
      });

      // Update UI
      var total = pdfDoc.numPages;
      document.getElementById('page-info').textContent = 'Page ' + num + ' of ' + total;
      document.getElementById('btn-prev').disabled = num <= 1;
      document.getElementById('btn-next').disabled = num >= total;
      document.getElementById('zoom-info').textContent = Math.round(scale * 100) + '%';

      var pct = Math.round((num / total) * 100);
      if (window.JavaBridge) window.JavaBridge.onPageChanged(num, total, pct);

      rendering = false;
      window.scrollTo(0, 0);
    });
  });
}

function changePage(delta) {
  var next = currentPage + delta;
  if (!pdfDoc || next < 1 || next > pdfDoc.numPages) return;
  renderPage(next);
}

function changeZoom(delta) {
  scale = Math.max(0.5, Math.min(3.0, scale + delta));
  renderPage(currentPage);
}

// Text selection  fires when user releases mouse after selecting
document.addEventListener('mouseup', function() {
  var sel = window.getSelection().toString().trim();
  if (sel.length > 0 && window.JavaBridge) {
    window.JavaBridge.onTextSelected(sel);
  }
});
</script>
</body>
</html>

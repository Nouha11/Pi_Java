<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #map { width: 100%; height: 100%; }

/* Library info card popup */
.lib-card {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-width: 220px;
}
.lib-card-header {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 10px; border-bottom: 1px solid #e2e8f0; margin-bottom: 10px;
}
.lib-card-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.lib-card-name { font-size: 14px; font-weight: 700; color: #1e293b; line-height: 1.3; }
.lib-card-address { font-size: 12px; color: #64748b; margin-top: 2px; }
.lib-card-dist {
  display: inline-block; background: #ede9fe; color: #5b21b6;
  font-size: 11px; font-weight: 700; padding: 3px 10px;
  border-radius: 20px; margin-bottom: 10px;
}
.lib-card-btn {
  width: 100%; padding: 9px;
  background: linear-gradient(to right, #6366f1, #8b5cf6);
  color: white; border: none; border-radius: 8px;
  font-weight: 700; font-size: 13px; cursor: pointer;
  transition: opacity 0.15s;
}
.lib-card-btn:hover { opacity: 0.9; }

/* User location pulse */
.user-pulse {
  width: 22px; height: 22px; background: #3b82f6;
  border-radius: 50%; border: 3px solid white;
  box-shadow: 0 0 0 0 rgba(59,130,246,0.5);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 rgba(59,130,246,0.5); }
  70%  { box-shadow: 0 0 0 16px rgba(59,130,246,0); }
  100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
}

/* Hint bar */
#hint {
  position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
  background: rgba(15,23,42,0.88); color: white; padding: 9px 20px;
  border-radius: 24px; font-size: 13px; font-family: sans-serif;
  pointer-events: none; z-index: 1000; white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
</style>
</head>
<body>
<div id="map"></div>
<div id="hint"> Click anywhere on the map to set your location</div>
<script>
var map = L.map('map').setView([36.8065, 10.1815], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: ' OpenStreetMap contributors', maxZoom: 19
}).addTo(map);

var libMarkers = [];
var userMarker = null;

// Custom library pin  purple circle with building emoji
function makeLibIcon(rank) {
  var colors = ['#f59e0b','#6366f1','#10b981','#ef4444','#0ea5e9'];
  var color = colors[(rank - 1) % colors.length];
  return L.divIcon({
    className: '',
    html: '<div style="position:relative;">' +
          '<div style="background:' + color + ';width:40px;height:40px;border-radius:50%;' +
          'border:3px solid white;display:flex;align-items:center;justify-content:center;' +
          'box-shadow:0 3px 10px rgba(0,0,0,0.35);font-size:20px;cursor:pointer;"></div>' +
          '<div style="position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);' +
          'width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;' +
          'border-top:8px solid ' + color + ';"></div>' +
          '</div>',
    iconSize: [40, 48], iconAnchor: [20, 48], popupAnchor: [0, -50]
  });
}

var userIcon = L.divIcon({
  className: '',
  html: '<div class="user-pulse"></div>',
  iconSize: [22, 22], iconAnchor: [11, 11]
});

function addMarker(lat, lng, name, address, distText, libId) {
  var rank = libMarkers.length + 1;
  var m = L.marker([lat, lng], { icon: makeLibIcon(rank) }).addTo(map);

  var distHtml = distText
    ? '<div class="lib-card-dist"> ' + distText + ' away</div>'
    : '';

  var html = '<div class="lib-card">' +
    '<div class="lib-card-header">' +
      '<div class="lib-card-icon"></div>' +
      '<div>' +
        '<div class="lib-card-name">' + name + '</div>' +
        (address ? '<div class="lib-card-address"> ' + address + '</div>' : '') +
      '</div>' +
    '</div>' +
    distHtml +
    '<button class="lib-card-btn" onclick="selectLib(' + libId + ')"> Request Loan</button>' +
    '</div>';

  m.bindPopup(html, { maxWidth: 260, className: 'lib-popup-wrap' });
  libMarkers.push({ marker: m, id: libId, lat: lat, lng: lng, rank: rank });
}

function selectLib(id) {
  if (window.JavaBridge) window.JavaBridge.onLibrarySelected(id);
}

function focusLibrary(lat, lng) {
  map.setView([lat, lng], 15);
  libMarkers.forEach(function(m) {
    if (Math.abs(m.lat - lat) < 0.0001 && Math.abs(m.lng - lng) < 0.0001) {
      m.marker.openPopup();
    }
  });
}

function fitAll() {
  if (!libMarkers.length) return;
  var group = L.featureGroup(libMarkers.map(function(m) { return m.marker; }));
  map.fitBounds(group.getBounds().pad(0.3));
}

function setUserLocation(lat, lng) {
  placeUserPin(lat, lng);
  map.setView([lat, lng], 14);
}

function placeUserPin(lat, lng) {
  if (userMarker) map.removeLayer(userMarker);
  userMarker = L.marker([lat, lng], { icon: userIcon, zIndexOffset: 2000 })
    .addTo(map)
    .bindPopup('<b> Your Location</b><br><small>' + lat.toFixed(5) + ', ' + lng.toFixed(5) + '</small>')
    .openPopup();
  document.getElementById('hint').style.display = 'none';
  if (window.JavaBridge) window.JavaBridge.onLocationObtained(lat, lng);
}

function clearMarkers() {
  libMarkers.forEach(function(m) { map.removeLayer(m.marker); });
  libMarkers = [];
}

// Click on map = set user location
map.on('click', function(e) {
  placeUserPin(e.latlng.lat, e.latlng.lng);
});
</script>
</body>
</html>
